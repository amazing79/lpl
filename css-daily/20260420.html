<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Portfolio Snapshot</title>
    <link rel="stylesheet" href="20260420.css">
</head>
<body>
    <div class="portfolio-card">
  <div class="card-header">
    <div class="header-left">
      <span class="label">Portfolio Value</span>
      <span class="total-value">$24,381.50</span>
    </div>
    <div class="header-right">
      <span class="change-badge">+5.42%</span>
      <span class="change-label">24h</span>
    </div>
  </div>

  <div class="asset-list">
    <div class="asset-row">
      <div class="asset-icon btc">₿</div>
      <div class="asset-info">
        <span class="asset-name">Bitcoin</span>
        <span class="asset-ticker">BTC</span>
      </div>
      <div class="asset-bar-wrap">
        <div class="asset-bar bar-btc"></div>
      </div>
      <div class="asset-values">
        <span class="asset-price">$62,410</span>
        <span class="asset-change up">+3.1%</span>
      </div>
    </div>

    <div class="asset-row">
      <div class="asset-icon eth">Ξ</div>
      <div class="asset-info">
        <span class="asset-name">Ethereum</span>
        <span class="asset-ticker">ETH</span>
      </div>
      <div class="asset-bar-wrap">
        <div class="asset-bar bar-eth"></div>
      </div>
      <div class="asset-values">
        <span class="asset-price">$3,180</span>
        <span class="asset-change up">+6.8%</span>
      </div>
    </div>

    <div class="asset-row">
      <div class="asset-icon sol">◎</div>
      <div class="asset-info">
        <span class="asset-name">Solana</span>
        <span class="asset-ticker">SOL</span>
      </div>
      <div class="asset-bar-wrap">
        <div class="asset-bar bar-sol"></div>
      </div>
      <div class="asset-values">
        <span class="asset-price">$148.90</span>
        <span class="asset-change up">+9.2%</span>
      </div>
    </div>

    <div class="asset-row">
      <div class="asset-icon dot">●</div>
      <div class="asset-info">
        <span class="asset-name">Polkadot</span>
        <span class="asset-ticker">DOT</span>
      </div>
      <div class="asset-bar-wrap">
        <div class="asset-bar bar-dot"></div>
      </div>
      <div class="asset-values">
        <span class="asset-price">$8.44</span>
        <span class="asset-change down">-1.3%</span>
      </div>
    </div>
  </div>

  <div class="card-footer">
    <div class="footer-stat">
      <span class="stat-label">Best Performer</span>
      <span class="stat-value accent">SOL +9.2%</span>
    </div>
    <div class="footer-divider"></div>
    <div class="footer-stat">
      <span class="stat-label">Portfolio Gain</span>
      <span class="stat-value positive">+$1,253.40</span>
    </div>
    <div class="footer-divider"></div>
    <div class="footer-stat">
      <span class="stat-label">Last Updated</span>
      <span class="stat-value">12:04 PM</span>
    </div>
  </div>
</div>
</body>
</html>
