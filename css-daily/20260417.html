<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Game Night Scorecard</title>
    <link rel="stylesheet" href="20260417.css">
</head>
<body>
    <div class="scorecard">
  <div class="scorecard-header">
    <span class="game-icon">🎲</span>
    <div class="header-text">
      <h2 class="game-title">Settlers of Catan</h2>
      <p class="game-meta">Round 4 of 6 · Friday Night</p>
    </div>
    <span class="round-badge">Live</span>
  </div>

  <div class="players-grid">
    <div class="player-row player-leader">
      <span class="player-rank">1</span>
      <span class="player-avatar">🦁</span>
      <span class="player-name">Marcus</span>
      <div class="score-bar-wrap">
        <div class="score-bar" style="width: 87%"></div>
      </div>
      <span class="player-score">10</span>
      <span class="player-delta delta-up">+2</span>
    </div>
    <div class="player-row">
      <span class="player-rank">2</span>
      <span class="player-avatar">🐺</span>
      <span class="player-name">Sofia</span>
      <div class="score-bar-wrap">
        <div class="score-bar" style="width: 70%"></div>
      </div>
      <span class="player-score">8</span>
      <span class="player-delta delta-up">+1</span>
    </div>
    <div class="player-row">
      <span class="player-rank">3</span>
      <span class="player-avatar">🦊</span>
      <span class="player-name">Jamie</span>
      <div class="score-bar-wrap">
        <div class="score-bar" style="width: 61%"></div>
      </div>
      <span class="player-score">7</span>
      <span class="player-delta delta-neutral">—</span>
    </div>
    <div class="player-row">
      <span class="player-rank">4</span>
      <span class="player-avatar">🐻</span>
      <span class="player-name">Priya</span>
      <div class="score-bar-wrap">
        <div class="score-bar" style="width: 44%"></div>
      </div>
      <span class="player-score">5</span>
      <span class="player-delta delta-down">-1</span>
    </div>
  </div>

  <div class="scorecard-footer">
    <div class="stat-chip">
      <span class="stat-label">Longest Road</span>
      <span class="stat-value">🦁 Marcus</span>
    </div>
    <div class="stat-chip">
      <span class="stat-label">Largest Army</span>
      <span class="stat-value">🐺 Sofia</span>
    </div>
    <div class="stat-chip">
      <span class="stat-label">Win Target</span>
      <span class="stat-value">12 pts</span>
    </div>
  </div>
</div>
</body>
</html>
