<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel packing Checklist</title>
    <link rel="stylesheet" href="20260414.css">
</head>

<body>
    <div class="checklist-card">
        <div class="card-header">
            <div class="header-left">
                <span class="card-icon">🧳</span>
                <div>
                    <h2 class="card-title">Packing Checklist</h2>
                    <p class="card-subtitle">Bangkok · Apr 20–27</p>
                </div>
            </div>
            <div class="progress-badge">
                <span class="progress-num">11</span>
                <span class="progress-label">/ 14</span>
            </div>
        </div>

        <div class="progress-bar-track">
            <div class="progress-bar-fill"></div>
        </div>

        <div class="categories">
            <div class="category">
                <p class="category-title">Essentials</p>
                <div class="item-list">
                    <div class="item checked"><span class="check-box checked-box"></span><span
                            class="item-label">Passport</span></div>
                    <div class="item checked"><span class="check-box checked-box"></span><span class="item-label">Travel
                            Insurance</span></div>
                    <div class="item checked"><span class="check-box checked-box"></span><span class="item-label">Visa
                            Documents</span></div>
                    <div class="item unchecked"><span class="check-box unchecked-box"></span><span
                            class="item-label">Local Currency</span></div>
                </div>
            </div>

            <div class="category">
                <p class="category-title">Clothing</p>
                <div class="item-list">
                    <div class="item checked"><span class="check-box checked-box"></span><span
                            class="item-label">T-Shirts (5×)</span></div>
                    <div class="item checked"><span class="check-box checked-box"></span><span
                            class="item-label">Shorts</span></div>
                    <div class="item checked"><span class="check-box checked-box"></span><span
                            class="item-label">Swimwear</span></div>
                    <div class="item unchecked"><span class="check-box unchecked-box"></span><span
                            class="item-label">Rain Jacket</span></div>
                </div>
            </div>

            <div class="category">
                <p class="category-title">Tech & Health</p>
                <div class="item-list">
                    <div class="item checked"><span class="check-box checked-box"></span><span class="item-label">Power
                            Adapter</span></div>
                    <div class="item checked"><span class="check-box checked-box"></span><span
                            class="item-label">Headphones</span></div>
                    <div class="item checked"><span class="check-box checked-box"></span><span
                            class="item-label">Sunscreen SPF50</span></div>
                    <div class="item unchecked"><span class="check-box unchecked-box"></span><span
                            class="item-label">Mosquito Spray</span></div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
