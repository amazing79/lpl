<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="20260424.css">
</head>
<body>
    <div class="tracker">
        <div class="tracker-header">
            <div class="header-left">
                <span class="header-icon">💼</span>
                <div>
                    <h1 class="tracker-title">Job Applications</h1>
                    <p class="tracker-subtitle">Spring 2026 · 8 tracked</p>
                </div>
            </div>
            <div class="stats-row">
                <div class="stat-pill stat-interviews">3 Interviews</div>
                <div class="stat-pill stat-offers">1 Offer</div>
            </div>
        </div>
    
        <div class="applications">
            <div class="app-row app-offer">
                <div class="app-status-bar"></div>
                <div class="app-company">Nova Labs</div>
                <div class="app-role">Senior Designer</div>
                <div class="app-date">Apr 2</div>
                <div class="app-badge badge-offer">Offer</div>
            </div>
            <div class="app-row app-interview">
                <div class="app-status-bar"></div>
                <div class="app-company">Stackwell</div>
                <div class="app-role">Product Designer</div>
                <div class="app-date">Apr 8</div>
                <div class="app-badge badge-interview">Interview</div>
            </div>
            <div class="app-row app-interview">
                <div class="app-status-bar"></div>
                <div class="app-company">Meridian AI</div>
                <div class="app-role">UX Lead</div>
                <div class="app-date">Apr 11</div>
                <div class="app-badge badge-interview">Interview</div>
            </div>
            <div class="app-row app-applied">
                <div class="app-status-bar"></div>
                <div class="app-company">Brightwave</div>
                <div class="app-role">UI Engineer</div>
                <div class="app-date">Apr 15</div>
                <div class="app-badge badge-applied">Applied</div>
            </div>
            <div class="app-row app-rejected">
                <div class="app-status-bar"></div>
                <div class="app-company">Orbis Corp</div>
                <div class="app-role">Design Systems</div>
                <div class="app-date">Mar 20</div>
                <div class="app-badge badge-rejected">Rejected</div>
            </div>
        </div>
    
        <div class="progress-section">
            <div class="progress-label">
                <span>Pipeline Progress</span>
                <span class="progress-pct">62%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>
</body>
</html>
