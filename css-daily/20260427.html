<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Class Schedule Card</title>
    <link rel="stylesheet" href="20260427.css">
</head>
<body>
    <div class="schedule-card">
        <div class="card-header">
            <div class="header-left">
                <span class="gym-label">APEX GYM</span>
                <h2 class="card-title">Class Schedule</h2>
            </div>
            <div class="day-badge">MON</div>
        </div>
    
        <div class="class-list">
            <div class="class-item class-yoga">
                <div class="class-time">06:00</div>
                <div class="class-info">
                    <span class="class-name">Morning Yoga</span>
                    <span class="class-meta">45 min · Studio A</span>
                </div>
                <div class="class-spots">4 left</div>
            </div>
    
            <div class="class-item class-spin">
                <div class="class-time">08:30</div>
                <div class="class-info">
                    <span class="class-name">Spin Cycle</span>
                    <span class="class-meta">60 min · Cycle Room</span>
                </div>
                <div class="class-spots full">Full</div>
            </div>
    
            <div class="class-item class-hiit">
                <div class="class-time">12:00</div>
                <div class="class-info">
                    <span class="class-name">HIIT Blast</span>
                    <span class="class-meta">30 min · Main Floor</span>
                </div>
                <div class="class-spots">12 left</div>
            </div>
    
            <div class="class-item class-pilates">
                <div class="class-time">17:30</div>
                <div class="class-info">
                    <span class="class-name">Pilates Core</span>
                    <span class="class-meta">50 min · Studio B</span>
                </div>
                <div class="class-spots">2 left</div>
            </div>
    
            <div class="class-item class-boxing">
                <div class="class-time">19:00</div>
                <div class="class-info">
                    <span class="class-name">Boxing Fit</span>
                    <span class="class-meta">60 min · Boxing Ring</span>
                </div>
                <div class="class-spots">8 left</div>
            </div>
        </div>
    
        <div class="card-footer">
            <div class="legend-item">
                <span class="legend-dot dot-low"></span>
                <span class="legend-text">Almost Full</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot dot-full"></span>
                <span class="legend-text">Full</span>
            </div>
            <button class="book-btn">Book a Class</button>
        </div>
    </div>
</body>
</html>
