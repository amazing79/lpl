<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast Week Card</title>
    <link rel="stylesheet" href="20260415.css">
</head>
<body>
   <div class="forecast-card">
  <div class="card-header">
    <div class="location">
      <span class="city">San Francisco</span>
      <span class="region">California, US</span>
    </div>
    <div class="current-temp">
      <span class="temp-value">64°</span>
      <span class="temp-label">Partly Cloudy</span>
    </div>
  </div>
  <div class="divider"></div>
  <div class="forecast-grid">
    <div class="day-card today">
      <span class="day-name">Today</span>
      <span class="day-icon">⛅</span>
      <span class="day-high">64°</span>
      <span class="day-low">51°</span>
    </div>
    <div class="day-card">
      <span class="day-name">Thu</span>
      <span class="day-icon">🌧️</span>
      <span class="day-high">58°</span>
      <span class="day-low">47°</span>
    </div>
    <div class="day-card">
      <span class="day-name">Fri</span>
      <span class="day-icon">🌦️</span>
      <span class="day-high">61°</span>
      <span class="day-low">49°</span>
    </div>
    <div class="day-card">
      <span class="day-name">Sat</span>
      <span class="day-icon">☀️</span>
      <span class="day-high">72°</span>
      <span class="day-low">55°</span>
    </div>
    <div class="day-card">
      <span class="day-name">Sun</span>
      <span class="day-icon">☀️</span>
      <span class="day-high">75°</span>
      <span class="day-low">57°</span>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-item">
      <span class="stat-label">Humidity</span>
      <span class="stat-value">72%</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Wind</span>
      <span class="stat-value">14 mph</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">UV Index</span>
      <span class="stat-value">3 Low</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Pressure</span>
      <span class="stat-value">1013 hPa</span>
    </div>
  </div>
</div> 
</body>
</html>
