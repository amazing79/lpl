<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Care Tracker</title>
    <link rel="stylesheet" href="20260429.css">
</head>
<body>
    <div class="tracker">
        <div class="tracker-header">
            <div class="header-left">
                <span class="leaf-icon">🌿</span>
                <div>
                    <h2 class="tracker-title">Plant Care Tracker</h2>
                    <p class="tracker-subtitle">My Indoor Garden</p>
                </div>
            </div>
            <div class="streak-badge">
                <span class="streak-number">14</span>
                <span class="streak-label">day streak</span>
            </div>
        </div>
    
        <div class="plants-grid">
            <div class="plant-card plant-healthy">
                <div class="plant-top">
                    <span class="plant-emoji">🪴</span>
                    <span class="status-dot dot-healthy"></span>
                </div>
                <p class="plant-name">Monstera</p>
                <p class="plant-type">Tropical</p>
                <div class="care-bar-wrap">
                    <div class="care-bar bar-high"></div>
                </div>
                <p class="next-water">Water in 2d</p>
            </div>
    
            <div class="plant-card plant-warning">
                <div class="plant-top">
                    <span class="plant-emoji">🌵</span>
                    <span class="status-dot dot-warning"></span>
                </div>
                <p class="plant-name">Cactus</p>
                <p class="plant-type">Desert</p>
                <div class="care-bar-wrap">
                    <div class="care-bar bar-low"></div>
                </div>
                <p class="next-water">Water in 9d</p>
            </div>
    
            <div class="plant-card plant-urgent">
                <div class="plant-top">
                    <span class="plant-emoji">🌸</span>
                    <span class="status-dot dot-urgent"></span>
                </div>
                <p class="plant-name">Orchid</p>
                <p class="plant-type">Flowering</p>
                <div class="care-bar-wrap">
                    <div class="care-bar bar-critical"></div>
                </div>
                <p class="next-water">Water today!</p>
            </div>
    
            <div class="plant-card plant-healthy">
                <div class="plant-top">
                    <span class="plant-emoji">🌿</span>
                    <span class="status-dot dot-healthy"></span>
                </div>
                <p class="plant-name">Pothos</p>
                <p class="plant-type">Vine</p>
                <div class="care-bar-wrap">
                    <div class="care-bar bar-medium"></div>
                </div>
                <p class="next-water">Water in 4d</p>
            </div>
        </div>
    
        <div class="tracker-footer">
            <div class="task-item">
                <span class="task-dot task-done"></span>
                <span class="task-text">Fertilized Monstera</span>
                <span class="task-date">Apr 27</span>
            </div>
            <div class="task-item">
                <span class="task-dot task-pending"></span>
                <span class="task-text">Repot Orchid</span>
                <span class="task-date">Apr 30</span>
            </div>
        </div>
    </div>
    
</body>
</html>
