<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Episode Player Card</title>
    <link rel="stylesheet" href="20260422.css">
</head>
<body>
    <div class="player-card">
    <div class="episode-header">
        <div class="podcast-art">
        <div class="art-inner">
            <div class="art-circle"></div>
            <div class="art-dot"></div>
        </div>
        </div>
        <div class="episode-meta">
        <span class="podcast-name">The Deep Dive</span>
        <h2 class="episode-title">The Future of Human Connection</h2>
        <div class="episode-tags">
            <span class="tag">Society</span>
            <span class="tag">Tech</span>
            <span class="tag">Ep. 142</span>
        </div>
        </div>
    </div>

    <div class="progress-section">
        <div class="progress-bar">
        <div class="progress-fill"></div>
        <div class="progress-thumb"></div>
        </div>
        <div class="time-row">
        <span class="time-current">24:37</span>
        <span class="time-total">58:12</span>
        </div>
    </div>

    <div class="controls-row">
        <button class="ctrl-btn skip">⏮</button>
        <button class="ctrl-btn rewind">↺ 15</button>
        <button class="ctrl-btn play">▶</button>
        <button class="ctrl-btn forward">↻ 15</button>
        <button class="ctrl-btn skip">⏭</button>
    </div>

    <div class="info-row">
        <div class="info-item">
        <span class="info-label">Speed</span>
        <span class="info-value">1.5×</span>
        </div>
        <div class="info-item">
        <span class="info-label">Remaining</span>
        <span class="info-value">33 min</span>
        </div>
        <div class="info-item">
        <span class="info-label">Released</span>
        <span class="info-value">Apr 20</span>
        </div>
        <div class="info-item">
        <span class="info-label">Rating</span>
        <span class="info-value">★★★★★</span>
        </div>
    </div>
</div>
</body>
</html>
