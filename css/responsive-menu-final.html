<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Menu</title>
</head>
<style>
    *, *::after, *::before{
        padding: 0;
        margin: 0;
        box-sizing: content-box;
    }

    body{
        background: #22C1C3;
        background: linear-gradient(0deg, rgba(34, 193, 195, 1) 0%, rgba(45, 90, 253, 1) 100%);
        min-height: 100vh;
    }

    header{
        background-color: black;
        color: #Fafafa;
        overflow: hidden;
    }

    nav{
        padding: 10px;
        display: flex;
        justify-items: center;
        align-items: center;
    }

    ul{
        margin-left: auto;
        margin-right: 20px;
        display: flex;
        flex-direction: row;
        gap: 10px;
    }

    li{
        list-style: none;
        display: inline-block;
        text-transform: uppercase;
    }

    li:hover{
        color: aqua;
        cursor: pointer;
    }

    .logo{
        text-shadow: 1px 1px 10px rgb(4, 255, 242);
    }

    @media screen and (max-width:700px) {
        body{
            font-size: 12px;
        }

    }
        
</style>
<body>
    <header>
        <nav>
            <h1 class="logo">Brand</h1>
            <ul>
                <li>Home</li>
                <li>Proyectos</li>
                <li>Consultas</li>
                <li>Login</li>
            </ul>
        </nav>
    </header>
</body>
</html>
