<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider CSS Puro</title>
</head>
<style>
    body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 20px;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
}

.slider-container {
    width: 80%;
    max-width: 800px;
    border: 5px solid white;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.slider {
    display: flex;
    overflow-x: auto; /* Habilita el scroll horizontal */
    scroll-snap-type: x mandatory; /* Fuerza el ajuste al hacer scroll*/
    scroll-behavior: smooth; /* Deslizamiento suave */
    
    /* Ocultar barra de scroll para estética */
    -ms-overflow-style: none;  /* IE y Edge */
    scrollbar-width: none;  /* Firefox */
}



.slider img {
    width: 100%;
    flex: 0 0 100%; /* Cada imagen ocupa el 100% del contenedor*/
    aspect-ratio: 16/9; /* Mantiene la proporción */
    object-fit: cover;
    scroll-snap-align: center; /* Alinea cada imagen al centro*/
}

.buttons {
    display: flex;
    gap: 10px;   
}

.buttons a {
    width: 1rem;
    height: 1rem;
    background-color: white;
    box-shadow: 1px 1px 10px rgba(0,0,0,0.5);
    border-radius: 50%;
}

</style>
<body>
    <div>
        <h1>CSS only Galery</h1>
    </div>
    <div class="slider-container">
        <div class="slider">
            <img id="img1" src="https://picsum.photos/800/400?image=1" alt="Imagen 1">
            <img id="img2" src="https://picsum.photos/800/400?image=2" alt="Imagen 2">
            <img id="img3" src="https://picsum.photos/800/400?image=3" alt="Imagen 3">
            <img id="img4" src="https://picsum.photos/800/400?image=4" alt="Imagen 4">
            <img id="img5" src="https://picsum.photos/800/400?image=5" alt="Imagen 5">
        </div>
    </div>
    <div class="buttons">
        <a href="#img1"></a>
        <a href="#img2"></a>
        <a href="#img3"></a>
        <a href="#img4"></a>
        <a href="#img5"></a>
    </div>
</body>
</html>
