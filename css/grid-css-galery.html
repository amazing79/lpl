<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Galery</title>
</head>
<style>
    @import url("https://fonts.googleapis.com/css2?family=Lato:wght@900&display=swap");

*,
*::after,
*::before {
  padding: 0;
  margin: 0;
  box-sizing: content-box;
}

.main {
  max-width: 1424px;
  margin: 20px auto;
  padding: 10px;
}

body {
  font-family: "Lato", sans-serif;
  background-color: #fff;
}

h2 {
  text-align: center;
  margin: 40px 0;
  color: #bb8fce;
  text-transform: uppercase;
  letter-spacing: 0.3em;
}

.container {
  display: grid;
  grid-auto-flow: dense;
  grid-template-columns: repeat(auto-fit, minmax(370px, 1fr));
  grid-gap: 5px;
  justify-content: center;
  padding: 10px;
}

.item {
  overflow: hidden;
  padding: 10px;
}

img {
    max-width: 100%;
    transition: transform ease 1s;
    filter: grayscale(0.9);
}

img:hover {
  transform: scale(1.3);
  filter: none;
}

.level-1 {
  grid-row-end: span 3;
}

.level-2 {
  grid-row-end: span 2;
}

.level-3 {
  grid-row-end: span 1;
}

</style>
<body>
    <div class="main">
  <h2>DevOff Challenge - Galery</h2>
  <div class="container">
    <div class="item level-3">
      <img src="https://github.com/devoffarg/DevOff-Desafio-1/blob/master/fotos/01.jpg?raw=true" />
    </div>
